<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rank</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="icon" href="../img/icon.png" />
</head>

<body>
  <header class="site-header">
    <div class="logo">
      <img src="../img/icon.png" alt="Logo" />
    </div>
    <nav>
      <a href="../index.html">Home</a>
      <a href="stats.html">Stats</a>
      <a href="funds.html">Funds</a>
      <a href="planes.html">Mariah's Planes</a>
      <a href="levelup.html" class="active">Rank</a>
    </nav>
  </header>

    <main class="level-page elegant-level fade-in">
    <section class="ring-showcase">
        <p class="eyebrow">relationship progression</p>

        <h1>Our Ring Levels</h1>

        <p class="level-intro">
        Each ring marks a different chapter of us. For now, we are here,
        in our Copper era.
        </p>

        <div class="ring-display">
        <button class="carousel-btn" id="prevBtn">‹</button>

        <div class="ring-stage">
        <div id="lockOverlay" class="lock-overlay">
            <div class="lock-content">
            <img src="../img/lock.png" class="lock-img" alt="Locked" />
            <p>Locked</p>
            </div>
        </div>

        <img id="ringImage" src="../img/copper.png" alt="Copper Ring" />
        <p id="ringStatus" class="ring-status unlocked-text">Unlocked</p>
        <h2 id="ringTitle">Copper Ring</h2>
        <p id="ringMeaning">In a relationship</p>
        <span id="ringBadge" class="ring-badge">Current Level</span>
        </div>

        <button class="carousel-btn" id="nextBtn">›</button>
        </div>

        <div class="ring-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        </div>
    </section>
    </main>

  <script src="../js/levelup.js"></script>
</body>
</html>
